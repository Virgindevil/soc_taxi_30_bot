<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Социальное такси Астрахань</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --error: #c0392b;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 15px; color: var(--primary);
        }
        .container {
            background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .label { font-size: 0.9rem; font-weight: bold; margin: 15px 0 5px; display: block; }
        input, select {
            width: 100%; padding: 12px; margin-bottom: 5px;
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem;
        }
        .error-text { color: var(--error); font-size: 0.75rem; margin-bottom: 10px; display: none; }
        .btn-send {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }
        .btn-send:disabled { opacity: 0.5; }
        .status { display: none; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; font-weight: bold; }
        .status.err { background: #fde8e8; color: var(--error); }
        .status.ok { background: #e8f8e8; color: #27ae60; }
        .debug { font-size: 0.7rem; color: #999; margin-top: 15px; padding: 8px; background: #eee; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚕 Социальное такси</h2>

    <span class="label">Льготная категория:</span>
    <select id="category">
        <option value="Инвалид 1 группы">Инвалид 1 группы</option>
        <option value="Инвалид 2 группы">Инвалид 2 группы</option>
        <option value="Участник СВО">Участник СВО</option>
    </select>

    <span class="label">Дата и время:</span>
    <div style="display: flex; gap: 10px;">
        <input type="date" id="date">
        <input type="time" id="time">
    </div>
    <div id="date-error" class="error-text">Выберите корректную дату (не из прошлого)</div>

    <span class="label">Адрес подачи и куда едем:</span>
    <input type="text" id="address_from" placeholder="Откуда (Астрахань/пригород)">
    <input type="text" id="address_to" placeholder="Куда (Напр: Поликлиника)">

    <span class="label">Контактный телефон:</span>
    <input type="tel" id="phone" placeholder="89001234567">
    <div id="phone-error" class="error-text">Введите корректный номер (только цифры)</div>

    <button class="btn-send" id="submitBtn" onclick="submitOrder()">Оформить заказ</button>
    <div class="status" id="statusMsg"></div>

    <div class="debug" id="debugInfo">Инициализация Bridge...</div>
</div>

<script>
    // Настройка ограничений даты
    const dateInput = document.getElementById('date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.min = today;
    dateInput.value = today;

    // Логирование состояния
    window.onload = () => {
        const debug = document.getElementById('debugInfo');
        if (window.WebApp) {
            debug.innerText = `✅ MAX Bridge готов. Платформа: ${window.WebApp.platform}`;
        } else {
            debug.innerText = `⚠️ Запущено вне MAX или Bridge не загружен`;
        }
    };

    function validate() {
        let isValid = true;
        const phone = document.getElementById('phone').value.replace(/\D/g, '');
        const date = document.getElementById('date').value;
        const from = document.getElementById('address_from').value;
        const to = document.getElementById('address_to').value;

        // Валидация телефона
        if (phone.length < 10) {
            document.getElementById('phone-error').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('phone-error').style.display = 'none';
        }

        // Валидация даты (проверка на 9999 год)
        const year = new Date(date).getFullYear();
        if (!date || year > 2027) {
            document.getElementById('date-error').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('date-error').style.display = 'none';
        }

        if (!from || !to) isValid = false;

        return isValid;
    }

    async function submitOrder() {
        if (!validate()) return;

        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusMsg');
        
        const message = `🚕 НОВЫЙ ЗАКАЗ ТАКСИ\n` +
            `Категория: ${document.getElementById('category').value}\n` +
            `Когда: ${document.getElementById('date').value} в ${document.getElementById('time').value}\n` +
            `Откуда: ${document.getElementById('address_from').value}\n` +
            `Куда: ${document.getElementById('address_to').value}\n` +
            `Тел: ${document.getElementById('phone').value}`;

        btn.disabled = true;
        btn.innerText = "Выбирайте чат с ботом...";

        if (window.WebApp && window.WebApp.shareMaxContent) {
            try {
                const result = await window.WebApp.shareMaxContent({ text: message });
                
                if (result.status === 'shared') {
                    status.innerText = "✅ Отправлено!";
                    status.className = "status ok";
                    status.style.display = "block";
                    setTimeout(() => window.WebApp.close(), 1500);
                } else {
                    btn.disabled = false;
                    btn.innerText = "Оформить заказ";
                }
            } catch (err) {
                status.innerText = "❌ Ошибка Bridge";
                status.className = "status err";
                status.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Оформить заказ";
            }
        } else {
            alert("Имитация заказа (вне MAX):\n" + message);
            btn.disabled = false;
            btn.innerText = "Оформить заказ";
        }
    }
</script>
</body>
</html>
