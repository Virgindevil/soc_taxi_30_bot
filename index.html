<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Социальное такси Астрахань</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            color: var(--primary-color);
        }
        .container {
            max-width: 100%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }
        .section-title {
            font-size: 0.9rem;
            font-weight: bold;
            margin: 15px 0 8px;
            display: block;
        }
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn-send {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-send:active {
            opacity: 0.8;
        }
        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .hint {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 10px;
            text-align: center;
        }
        .status {
            display: none;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }
        .status.error {
            background: #fde8e8;
            color: #c0392b;
        }
        .status.success {
            background: #e8f8e8;
            color: #27ae60;
        }
        .debug-info {
            font-size: 0.75rem;
            color: #999;
            margin-top: 15px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 6px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚕 Социальное такси (Астрахань)</h2>

    <label class="section-title">Категория льготы:</label>
    <select id="category">
        <option value="Инвалид 1 группы">Инвалид 1 группы</option>
        <option value="Инвалид 2 группы">Инвалид 2 группы</option>
        <option value="Участник СВО">Участник СВО (ветеран БД)</option>
    </select>

    <label class="section-title">Дата и время подачи:</label>
    <div style="display: flex; gap: 10px;">
        <input type="date" id="date">
        <input type="time" id="time">
    </div>

    <label class="section-title">Адрес подачи (Астрахань/пригород):</label>
    <input type="text" id="address_from" placeholder="Улица, дом, подъезд">

    <label class="section-title">Куда едем:</label>
    <input type="text" id="address_to" placeholder="Напр: Поликлиника №1">

    <label class="section-title">Контактный телефон:</label>
    <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">

    <button class="btn-send" id="submitBtn" onclick="submitOrder()">Оформить заказ</button>
    
    <div class="status" id="statusMsg"></div>
    <p class="hint" id="hintText">Заявка будет отправлена диспетчеру через чат</p>
    
    <!-- Блок для отладки — покажет, работает ли WebApp -->
    <div class="debug-info" id="debugInfo">Загрузка...</div>
</div>

<script>
    // Устанавливаем сегодняшнюю дату по умолчанию
    document.getElementById('date').valueAsDate = new Date();

    // Проверяем, доступен ли WebApp после загрузки страницы
    window.addEventListener('load', function() {
        const debugEl = document.getElementById('debugInfo');
        
        if (window.WebApp) {
            debugEl.textContent = '✅ WebApp доступен. Платформа: ' + (window.WebApp.platform || 'неизвестно');
        } else {
            debugEl.textContent = '⚠️ WebApp недоступен — откройте через MAX';
        }
    });

    function showStatus(message, type) {
        const el = document.getElementById('statusMsg');
        el.textContent = message;
        el.className = 'status ' + type;
        el.style.display = 'block';
    }

    function submitOrder() {
        const data = {
            category: document.getElementById('category').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            from: document.getElementById('address_from').value,
            to: document.getElementById('address_to').value,
            phone: document.getElementById('phone').value
        };

        // Проверка на заполнение полей
        if (!data.from || !data.to || !data.phone || !data.time) {
            showStatus('Пожалуйста, заполните все поля заказа', 'error');
            return;
        }

        // Формируем текст для бота
        // ВАЖНО: используем простой текст без markdown-разметки,
        // так как shareMaxContent отправляет обычный текст
        const message = 
            '🚕 НОВЫЙ ЗАКАЗ ТАКСИ (АСТРАХАНЬ)\n' +
            '--------------------------\n' +
            '👤 Категория: ' + data.category + '\n' +
            '📅 Когда: ' + data.date + ' в ' + data.time + '\n' +
            '📍 Откуда: ' + data.from + '\n' +
            '🏁 Куда: ' + data.to + '\n' +
            '📞 Телефон: ' + data.phone;

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Отправка...';

        // Проверяем, открыто ли приложение внутри MAX
        if (window.WebApp && window.WebApp.shareMaxContent) {
            // Тактильный отклик при успехе
            if (window.WebApp.HapticFeedback) {
                window.WebApp.HapticFeedback.notificationOccurred('success');
            }

            // shareMaxContent отправляет текст в выбранный пользователем чат.
            // Пользователю покажется экран выбора чата — он должен выбрать
            // чат с ботом, чтобы заявка пришла диспетчеру.
            window.WebApp.shareMaxContent({
                text: message
            }).then(function(result) {
                if (result.status === 'shared') {
                    showStatus('✅ Заявка отправлена!', 'success');
                    // Небольшая задержка перед закрытием
                    setTimeout(function() {
                        window.WebApp.close 
                            ? window.WebApp.close() 
                            : window.close();
                    }, 1500);
                } else if (result.status === 'cancelled') {
                    showStatus('Отправка отменена. Попробуйте снова.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Оформить заказ';
                }
            }).catch(function(err) {
                console.error('Ошибка shareMaxContent:', err);
                showStatus('Ошибка отправки: ' + (err.error ? err.error.code : err), 'error');
                btn.disabled = false;
                btn.textContent = 'Оформить заказ';
            });

        } else {
            // Фолбэк для тестирования в браузере
            console.log('=== ТЕСТ (не MAX) ===');
            console.log(message);
            showStatus('Тест: заказ сформирован. Откройте через MAX для реальной отправки.', 'error');
            btn.disabled = false;
            btn.textContent = 'Оформить заказ';
        }
    }
</script>

</body>
</html>
