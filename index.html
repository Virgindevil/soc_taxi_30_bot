<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://dev.max.ru/js/max-web-app.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f9;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color);
            padding: 15px;
            color: #333;
        }
        .form-group { margin-bottom: 15px; }
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: 600; 
            font-size: 14px;
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; /* Чтобы padding не раздувал ширину */
            font-size: 16px; /* Предотвращает зум на iPhone */
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active { background-color: #0056b3; }
        h3 { text-align: center; color: #222; }
    </style>
</head>
<body>
    <h3>Заказ социального такси</h3>
    
    <div class="form-group">
        <label>Категория льготы</label>
        <select id="category">
            <option value="Участник СВО">Участник СВО</option>
            <option value="Инвалид 1 или 2 группы">Инвалид 1 или 2 группы</option>
        </select>
    </div>

    <div class="form-group">
        <label>Дата поездки</label>
        <input type="date" id="date">
    </div>

    <div class="form-group">
        <label>Время подачи</label>
        <input type="time" id="time">
    </div>

    <div class="form-group">
        <label>Адрес подачи (г. Астрахань и пригород)</label>
        <input type="text" id="address" placeholder="Напр: ул. Ленина, 1">
    </div>

    <button id="main-button" onclick="sendData()">Отправить заявку</button>

    <script>
        const webApp = window.WebApp;
        // Расширяем приложение на всё окно
        webApp.expand();

        function sendData() {
            // Пробуем найти WebApp в разных местах
            const tg = window.WebApp || window.parent.WebApp;
            
            if (tg && typeof tg.sendData === 'function') {
                const data = {
                    category: document.getElementById('category').value,
                    address: document.getElementById('address').value,
                    date: document.getElementById('date').value
                };
                tg.sendData(JSON.stringify(data));
            } else {
                alert("Библиотека MAX не найдена. Попробуйте обновить страницу.");
            }
        }

            // Отправляем данные боту
            webApp.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
