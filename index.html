<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Социальное Такси</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🚕 Новый заказ</h3>
        <label>Категория:</label>
        <select id="category">
            <option value="Инвалид 1 гр.">Инвалид 1 группы</option>
            <option value="Пенсионер">Пенсионер</option>
        </select>
        
        <label>Куда едем:</label>
        <input type="text" id="address" placeholder="Улица, дом...">
        
        <label>Когда:</label>
        <input type="datetime-local" id="date">
        
        <button onclick="handleOrder()">Оформить заказ</button>
    </div>

    <script>
        function handleOrder() {
            const addr = document.getElementById('address').value;
            const cat = document.getElementById('category').value;
            const time = document.getElementById('date').value;

            if (!addr || !time) {
                alert("Заполните все поля!");
                return;
            }

            // Формируем текст сообщения
            const text = `ЗАКАЗ ТАКСИ\n📍 Адрес: ${addr}\n👤 Категория: ${cat}\n⏰ Время: ${time}`;
            
            // Используем официальный диплинк шеринга MAX для отправки сообщения боту
            const shareUrl = `https://max.ru/:share?text=${encodeURIComponent(text)}`;
            
            // Открываем окно шеринга
            window.WebApp.openLink(shareUrl);
        }
    </script>
</body>
</html>
